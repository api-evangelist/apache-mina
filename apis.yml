apis:
  - aid: apache-mina:apache-mina-core
    name: Apache MINA Core
    description: >-
      MINA Core provides a Java NIO-based API for building high-performance network applications with support for TCP and UDP protocols, an event-driven filter chain for protocol codecs, session management, and both client and server roles. Current version is 2.2.5.
    humanURL: https://mina.apache.org/mina-project/documentation.html
    tags:
      - Java
      - NIO
      - Networking
      - TCP
      - UDP
    properties:
      - type: Documentation
        url: https://mina.apache.org/mina-project/documentation.html
      - type: GettingStarted
        url: https://mina.apache.org/mina-project/userguide/user-guide-toc.html
      - type: SDK
        url: https://central.sonatype.com/artifact/org.apache.mina/mina-core
        title: Maven Central (Java)
      - type: GitHubRepository
        url: https://github.com/apache/mina
  - aid: apache-mina:apache-mina-sshd
    name: Apache MINA SSHD
    description: >-
      Apache MINA SSHD is a comprehensive Java library for client- and server-side SSH protocol implementation. It supports SCP, SFTP, port forwarding, key management, and various authentication methods. Current version is 2.17.1.
    humanURL: https://mina.apache.org/sshd-project/index.html
    tags:
      - Java
      - Security
      - SCP
      - SFTP
      - SSH
    properties:
      - type: Documentation
        url: https://mina.apache.org/sshd-project/index.html
      - type: SDK
        url: https://central.sonatype.com/artifact/org.apache.sshd/sshd-core
        title: Maven Central (Java)
      - type: GitHubRepository
        url: https://github.com/apache/mina-sshd
  - aid: apache-mina:apache-ftpserver
    name: Apache FtpServer
    description: >-
      Apache FtpServer is a 100% pure Java FTP server built on MINA. It is designed to be used as a complete and portable FTP server engine solution based on currently available open protocols. Current version is 1.2.1.
    humanURL: https://mina.apache.org/ftpserver-project/index.html
    tags:
      - FTP
      - Java
      - Server
    properties:
      - type: Documentation
        url: https://mina.apache.org/ftpserver-project/index.html
      - type: SDK
        url: https://central.sonatype.com/artifact/org.apache.ftpserver/ftpserver-core
        title: Maven Central (Java)
      - type: GitHubRepository
        url: https://github.com/apache/mina
